<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — tvoj-dj.si</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230B0A12'/><text x='50' y='68' font-size='58' font-weight='800' fill='%23A855F7' text-anchor='middle' font-family='Arial'>dj</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="admin-login">
  <div class="login-card">
    <div class="logo" style="font-size:24px;margin-bottom:8px">tvoj<span class="a">-dj</span><span class="b">.si</span></div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:24px">Admin prijava</p>
    <div class="fg" style="margin-bottom:14px">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@email.com">
    </div>
    <div class="fg" style="margin-bottom:20px">
      <label>Geslo</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="login()">Prijava</button>
    <p id="loginError" style="color:#EF4444;font-size:13px;margin-top:14px;display:none"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView" style="display:none">
  <nav id="nav" class="scrolled">
    <div class="wrap nav-inner">
      <span class="logo">tvoj<span class="a">-dj</span><span class="b">.si</span> <span style="color:var(--muted-2);font-size:14px;font-weight:500">admin</span></span>
      <div class="nav-cta">
        <button class="btn btn-ghost" style="padding:9px 18px;font-size:14px" onclick="logout()">Odjava</button>
      </div>
    </div>
  </nav>

  <div class="wrap" style="padding-top:110px;padding-bottom:60px">
    <!-- TABS -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="inquiries" onclick="switchTab('inquiries')">Povpraševanja</button>
      <button class="admin-tab" data-tab="djs" onclick="switchTab('djs')">DJ-ji</button>
    </div>

    <!-- POVPRAŠEVANJA -->
    <div id="tab-inquiries" class="admin-panel">
      <div id="inquiriesList"><p style="color:var(--muted)">Nalagam ...</p></div>
    </div>

    <!-- DJ-ji (Faza C) -->
    <div id="tab-djs" class="admin-panel" style="display:none">
        <div id="djAdminArea"></div>
      </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/admin.js"></script>
</body>
</html>
